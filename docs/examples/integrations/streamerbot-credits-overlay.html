<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Streamer.bot Credits Overlay</title>
  <style>
    :root {
      --bg: transparent;
      --text: #f7f4ec;
      --muted: #b9d8d2;
      --accent: #ffcf5a;
      --shadow: rgba(0, 0, 0, 0.7);
      --duration: 70s;
      --font: "Segoe UI", Arial, sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
    }

    .stage {
      position: relative;
      width: min(100vw, 1280px);
      height: 100vh;
      overflow: hidden;
      mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 16%,
        black 84%,
        transparent 100%
      );
    }

    .credits {
      position: absolute;
      left: 50%;
      top: 100%;
      width: min(78vw, 920px);
      transform: translateX(-50%);
      text-align: center;
      animation: roll var(--duration) linear forwards;
      text-shadow: 0 3px 18px var(--shadow);
    }

    @keyframes roll {
      from {
        transform: translate(-50%, 0);
      }
      to {
        transform: translate(-50%, calc(-100% - 110vh));
      }
    }

    .intro {
      min-height: 30vh;
      display: grid;
      align-content: end;
      gap: 18px;
      padding-bottom: 64px;
    }

    .intro h1 {
      margin: 0;
      color: var(--accent);
      font-size: clamp(48px, 8vw, 104px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .intro p,
    .empty,
    .outro {
      margin: 0;
      color: var(--muted);
      font-size: clamp(24px, 3vw, 40px);
      line-height: 1.35;
      font-weight: 600;
    }

    .section {
      margin: 0 0 58px;
    }

    .section h2 {
      margin: 0 0 20px;
      color: var(--accent);
      font-size: clamp(28px, 4vw, 54px);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .names {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: clamp(24px, 3.8vw, 48px);
      line-height: 1.18;
      font-weight: 700;
    }

    .detail {
      display: block;
      color: var(--muted);
      font-size: 0.62em;
      font-weight: 600;
      line-height: 1.2;
      margin-top: 4px;
    }

    .outro {
      min-height: 60vh;
      display: grid;
      align-content: start;
      padding-top: 30px;
    }

    .status {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 20px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 18px;
      text-align: center;
      text-shadow: 0 2px 10px var(--shadow);
    }

    body.ready .status {
      display: none;
    }
  </style>
</head>
<body>
  <main class="stage">
    <article class="credits" id="credits"></article>
  </main>
  <div class="status" id="status">Загружаю титры из Streamer.bot...</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    let endpoint = params.get("endpoint") || (params.get("test") === "1" ? "/TestCredits" : "/GetCredits");
    let duration = params.get("duration") || params.get("speed") || "70s";
    let introTitle = params.get("title") || "Спасибо за стрим";
    let introText = params.get("subtitle") || "Сегодня с нами были";
    let outroText = params.get("outro") || "Увидимся на следующем стриме";
    let donationFields = parseFields(params.get("donationFields") || params.get("fields") || "name,amount");
    let hideSections = parseSectionList(params.get("hideSections") || params.get("hide") || "");
    let showSections = parseSectionList(params.get("showSections") || params.get("show") || "");

    document.documentElement.style.setProperty("--duration", normalizeDuration(duration));
    setCssVariable("--bg", params.get("bg"));
    setCssVariable("--text", params.get("text"));
    setCssVariable("--muted", params.get("muted"));
    setCssVariable("--accent", params.get("accent"));
    setCssVariable("--shadow", params.get("shadow"));
    setCssVariable("--font", params.get("font"));

    const sectionNames = {
      Follows: "Новые фолловеры",
      Cheers: "Bits / Cheers",
      Subs: "Подписки",
      ReSubs: "Продления подписки",
      GiftSubs: "Подарочные подписки",
      GiftBombs: "Массовые подарочные подписки",
      Raided: "Рейды",
      RewardRedemptions: "Награды канала",
      GoalContributions: "Вклады в цели",
      GameUpdates: "Игры за стрим",
      Pyramids: "Пирамидки",
      HypeTrainConductor: "Hype Train conductor",
      HypeTrainContributors: "Hype Train contributors",
      Editors: "Редакторы",
      Moderator: "Модераторы",
      Subscriber: "Сабскрайберы в чате",
      VIPs: "VIP-гости",
      Users: "Зрители в чате",
      TopBitsAll: "Топ Bits за всё время",
      TopBitsMonth: "Топ Bits за месяц",
      TopBitsWeek: "Топ Bits за неделю",
      TopChannelRewards: "Топ наград канала"
    };

    loadCredits();

    async function loadCredits() {
      try {
        const config = await loadOverlayConfig();
        applyOverlayConfig(config);

        const response = await fetch(endpoint, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        renderCredits(data);
      } catch (error) {
        document.getElementById("status").textContent =
          "Не получилось получить титры. Проверь, что HTTP Server в Streamer.bot запущен и URL открыт через http://127.0.0.1:7474/...";
        console.error(error);
      }
    }

    async function loadOverlayConfig() {
      const configUrl = params.get("config") || "credits-config.json";
      try {
        const response = await fetch(`${configUrl}?_=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) {
          return {};
        }
        return await response.json();
      } catch {
        return {};
      }
    }

    function applyOverlayConfig(config) {
      if (!config || typeof config !== "object") {
        return;
      }

      if (!params.has("endpoint") && !params.has("test") && config.endpoint) endpoint = config.endpoint;
      if (!params.has("duration") && !params.has("speed") && config.duration) duration = config.duration;
      if (!params.has("title") && config.title) introTitle = config.title;
      if (!params.has("subtitle") && config.subtitle) introText = config.subtitle;
      if (!params.has("outro") && config.outro) outroText = config.outro;
      if (!params.has("donationFields") && !params.has("fields") && config.donationFields) donationFields = parseFields(config.donationFields);
      if (!params.has("hideSections") && !params.has("hide") && config.hideSections) hideSections = parseSectionList(config.hideSections);
      if (!params.has("showSections") && !params.has("show") && config.showSections) showSections = parseSectionList(config.showSections);

      if (config.sectionLabels && typeof config.sectionLabels === "object") {
        Object.assign(sectionNames, config.sectionLabels);
      }

      const style = config.style || {};
      document.documentElement.style.setProperty("--duration", normalizeDuration(duration));
      setCssVariable("--bg", params.get("bg") || style.bg);
      setCssVariable("--text", params.get("text") || style.text);
      setCssVariable("--muted", params.get("muted") || style.muted);
      setCssVariable("--accent", params.get("accent") || style.accent);
      setCssVariable("--shadow", params.get("shadow") || style.shadow);
      setCssVariable("--font", params.get("font") || style.font);
    }

    function renderCredits(data) {
      const sections = [];
      const events = data.Events || data.events || {};
      const hypeTrain = data.HypeTrain || data.hypeTrain || {};
      const users = data.User || data.Users || data.user || data.users || {};
      const groups = data.Groups || data.groups || {};
      const top = data.Top || data.top || {};
      const custom = data.Custom || data.custom || {};

      Object.entries(events).forEach(([key, value]) => {
        addSection(sections, key, labelFor(key), value);
      });

      addSection(sections, "HypeTrainConductor", labelFor("HypeTrainConductor"), data.HypeTrainConductor || hypeTrain.conductors || hypeTrain.Conductors);
      addSection(sections, "HypeTrainContributors", labelFor("HypeTrainContributors"), data.HypeTrainContributors || hypeTrain.contributors || hypeTrain.Contributors);

      Object.entries(users).forEach(([key, value]) => {
        addSection(sections, key, labelFor(key), value);
      });

      Object.entries(groups).forEach(([key, value]) => {
        addSection(sections, key, labelFor(key), value);
      });

      if (data.TopBits || Object.keys(top).length) {
        addSection(sections, "allBits", labelFor("allBits"), data.TopBits ? data.TopBits.All : top.allBits);
        addSection(sections, "monthBits", labelFor("monthBits"), data.TopBits ? data.TopBits.Month : top.monthBits);
        addSection(sections, "weekBits", labelFor("weekBits"), data.TopBits ? data.TopBits.Week : top.weekBits);
      }

      addSection(sections, "TopChannelRewards", labelFor("TopChannelRewards"), data.TopChannelRewards || top.channelRewards || top.topChannelRewards);

      Object.entries(custom).forEach(([key, value]) => {
        addSection(sections, key, labelFor(key), value);
      });

      const content = [
        `<header class="intro"><h1>${escapeHtml(introTitle)}</h1><p>${escapeHtml(introText)}</p></header>`,
        sections.length ? sections.join("") : `<p class="empty">Пока нет записей для титров</p>`,
        `<footer class="outro">${escapeHtml(outroText)}</footer>`
      ].join("");

      document.getElementById("credits").innerHTML = content;
      document.body.classList.add("ready");
    }

    function addSection(sections, key, title, rawItems) {
      if (!shouldShowSection(key)) {
        return;
      }

      const items = normalizeItems(rawItems);
      if (!items.length) {
        return;
      }

      const visibleItems = uniqueByText(items).slice(0, 80);
      const list = visibleItems.map((item) => {
        const detail = item.detail ? `<span class="detail">${escapeHtml(item.detail)}</span>` : "";
        return `<li>${escapeHtml(item.name)}${detail}</li>`;
      }).join("");

      sections.push(`<section class="section"><h2>${escapeHtml(title)}</h2><ul class="names">${list}</ul></section>`);
    }

    function shouldShowSection(key) {
      const normalized = normalizeSectionKey(key);
      if (showSections.length && !showSections.includes(normalized)) {
        return false;
      }
      return !hideSections.includes(normalized);
    }

    function normalizeItems(rawItems) {
      if (!rawItems) {
        return [];
      }

      const items = Array.isArray(rawItems) ? rawItems : Object.values(rawItems);
      return items
        .map((item) => {
          if (typeof item === "string" || typeof item === "number") {
            return { name: String(item), detail: "" };
          }

          if (!item || typeof item !== "object") {
            return null;
          }

          const name =
            item.donorName ||
            item.DonorName ||
            item.displayName ||
            item.DisplayName ||
            item.userName ||
            item.UserName ||
            item.name ||
            item.Name ||
            item.user ||
            item.User ||
            item.login ||
            item.Login ||
            item.title ||
            item.Title ||
            "";

          const isDonation = item.donorName || item.DonorName || item.creditsSection || item.CreditsSection || item.creditsFields || item.CreditsFields;
          const itemFields = parseFields(item.creditsFields || item.CreditsFields || donationFields.join(","));
          const detailParts = isDonation
            ? buildDonationDetails(item, itemFields)
            : [
                item.platform || item.Platform,
                item.source || item.Source,
                formatAmount(item.amount || item.Amount, item.currency || item.Currency),
                item.count || item.Count,
                item.months || item.Months,
                item.reward || item.Reward,
                item.game || item.Game,
                item.message || item.Message,
                item.text || item.Text
              ].filter(Boolean);

          return name ? { name: String(name), detail: detailParts.join(" • ") } : null;
        })
        .filter(Boolean);
    }

    function formatAmount(amount, currency) {
      if (!amount && !currency) {
        return "";
      }
      return [amount, currency].filter(Boolean).join(" ");
    }

    function buildDonationDetails(item, fields) {
      const parts = [];
      fields.forEach((field) => {
        if (field === "platform") {
          const value = item.platform || item.Platform;
          if (value) parts.push(value);
        }
        if (field === "amount") {
          const value = formatAmount(item.amount || item.Amount, item.currency || item.Currency);
          if (value) parts.push(value);
        }
        if (field === "message") {
          const value = item.message || item.Message || item.text || item.Text;
          if (value) parts.push(value);
        }
      });
      return parts;
    }

    function parseFields(value) {
      const raw = Array.isArray(value) ? value.join(",") : String(value || "");
      const allowed = new Set(["name", "platform", "amount", "message"]);
      const fields = raw
        .split(",")
        .map((part) => part.trim().toLowerCase())
        .filter((part) => allowed.has(part));
      return fields.length ? fields : ["name", "amount"];
    }

    function parseSectionList(value) {
      const raw = Array.isArray(value) ? value.join(",") : String(value || "");
      return raw
        .split(/[,\n;]+/)
        .map((part) => normalizeSectionKey(part))
        .filter(Boolean);
    }

    function normalizeSectionKey(value) {
      return String(value || "").trim().toLowerCase();
    }

    function labelFor(key) {
      const text = String(key || "");
      return sectionNames[text] || sectionNames[text.toLowerCase()] || sectionNames[text.toUpperCase()] || text;
    }

    function uniqueByText(items) {
      const seen = new Set();
      return items.filter((item) => {
        const key = `${item.name}|${item.detail}`;
        if (seen.has(key)) {
          return false;
        }
        seen.add(key);
        return true;
      });
    }

    function normalizeDuration(value) {
      return /^\d+(\.\d+)?(ms|s)$/i.test(value) ? value : `${parseFloat(value) || 70}s`;
    }

    function setCssVariable(name, value) {
      if (value) {
        document.documentElement.style.setProperty(name, value);
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
